# Tenant B side:
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: dranet-net
  namespace: tenant-b
spec:
  spec:
    devices:
      requests:
        - name: sriovvfs
          exactly:
            deviceClassName: dranet-whereabouts-sriovvfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  namespace: tenant-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-b
  template:
    metadata:
      labels:
        app: app-b
    spec:
      resourceClaims:
        - name: sriovvfs
          resourceClaimTemplateName: dranet-net
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.54
          command: ["sleep", "infinity"]
